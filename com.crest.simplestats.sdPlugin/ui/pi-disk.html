<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="sdpi-components.js"></script>
    <link rel="stylesheet" href="pi-common.css" />
    <title>Disk</title>
  </head>
  <body>
    <sdpi-item id="metric-row" label="Metric">
      <sdpi-select id="metric" setting="metric"></sdpi-select>
    </sdpi-item>

    <sdpi-item id="disk-row" label="Disk">
      <div class="select-with-refresh">
        <select id="disk" class="sdpi-item-value"></select>
        <button id="rescan-disks" class="refresh-btn" title="Rescan disks" aria-label="Rescan disks">&#8635;</button>
      </div>
    </sdpi-item>

    <sdpi-item id="disk-space-note">
      <div class="help-text">Disk space updates every 60 seconds.</div>
    </sdpi-item>

    <sdpi-item id="poll-row" label="Polling">
      <sdpi-select id="poll-interval" setting="pollIntervalSec">
        <option value="1">1 sec</option>
        <option value="2">2 sec</option>
        <option value="3">3 sec</option>
        <option value="4">4 sec</option>
        <option value="5">5 sec</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item id="warn-threshold-row" label="Alert %">
      <sdpi-textfield id="warn-threshold" type="number" placeholder="0 (off)"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item id="threshold-note">
      <div class="help-text">Value text and graph line turn red when above threshold.</div>
    </sdpi-item>

    <sdpi-item id="top-threshold-row" label="Idle below (MB/s)">
      <sdpi-textfield id="top-threshold" type="number" placeholder="5"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item id="top-threshold-note">
      <div class="help-text">Shows IDLE when top process is below this MB/s. 0 to disable.</div>
    </sdpi-item>

    <script src="pi-common.js"></script>
    <script src="pi-disk.js"></script>
  </body>
</html>
